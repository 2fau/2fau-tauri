name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI only reads the repo — no write scopes on the token.
permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      # Library crates only. The Tauri app is checked in the `app` job because its
      # generate_context! macro needs a built frontend (dist/).
      - run: cargo clippy -p twofau-core -p twofau-wasm --all-targets -- -D warnings
      - run: cargo test -p twofau-core

  wasm:
    name: WASM build + JS interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      # Emit ts-rs bindings so the typed index has its types.
      - run: cargo test -p twofau-core
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build:wasm
      - run: pnpm --filter @twofau/core-wasm test
      - run: pnpm --filter @twofau/ui test

  app:
    name: Tauri app (frontend build + cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      # Tauri's Linux build deps (webkit2gtk etc.).
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev
      - run: cargo test -p twofau-core # emit ts-rs bindings for the UI types
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build:wasm
      - run: pnpm --filter @twofau/app build # tsc + vite -> dist/
      - run: cargo check -p twofau-app

