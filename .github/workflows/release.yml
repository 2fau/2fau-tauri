name: Release

# Builds native installers on each OS (the reliable path — cross-building a
# Windows NSIS installer from macOS is unsupported/flaky).
#
#   - push to main / manual dispatch -> "Continuous Release" prerelease (tag: tip)
#   - v* tag                          -> draft GitHub Release for that version
#
# Everything publishes in a single run with the default GITHUB_TOKEN, so no PAT
# is needed (a tag push would otherwise not re-trigger a separate workflow).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Least privilege by default; the jobs that touch releases elevate to write.
permissions:
  contents: read

jobs:
  # For the rolling continuous build, drop the previous release + tip tag so it
  # re-cuts at the current commit. Skipped for versioned (v*) releases.
  reset-tip:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete previous continuous release and tag
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: gh release delete tip --repo "$REPO" --cleanup-tag --yes || true

  bundle:
    needs: [reset-tip]
    # Run after reset-tip on the continuous path, or immediately for v* tags
    # (where reset-tip is skipped).
    if: always() && (needs.reset-tip.result == 'success' || needs.reset-tip.result == 'skipped')
    permissions:
      contents: write # create/upload the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
          - platform: macos-13 # Intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
          - platform: windows-latest
            target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./ -> target"

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0

      - name: Install Linux bundling deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      # The frontend needs the ts-rs bindings (cargo test) and the WASM package.
      - run: cargo test -p twofau-core
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build:wasm

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/twofau-app
          # tag push -> versioned draft; otherwise the rolling "tip" prerelease.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'tip' }}
          releaseName: ${{ github.ref_type == 'tag' && format('2FAU {0}', github.ref_name) || 'Continuous Release' }}
          releaseBody: ${{ github.ref_type == 'tag' && '' || 'Automatically built from the latest commit on main. Unstable.' }}
          releaseDraft: ${{ github.ref_type == 'tag' }}
          prerelease: ${{ github.ref_type != 'tag' }}
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
